<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorBridge Login</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <div class="login-header">
                <h1>VendorBridge</h1>
                <p>Procurement & Vendor Management ERP</p>
            </div>

            <form>

                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <div class="input-group">
                    <label>Select Role</label>

                    <select required>
                        <option value="">Choose Role</option>
                        <option>Admin</option>
                        <option>Manager / Approver</option>
                        <option>Procurement Officer</option>
                        <option>Vendor</option>
                    </select>
                </div>

                <div class="options">

                    <label>
                         Remember Me <input type="checkbox">
                    </label>

                    <a href="https://accounts.google.com/v3/signin/challenge/pwd?TL=ADCchmYJCyqZDiPejAe9qe4gKTTghysLAKJmvTEJ7DlOFpQhpmKIPmrZiamPoWnz&authuser=0&cid=2&continue=https%3A%2F%2Fmyaccount.google.com%2Fsigninoptions%2Fpassword&dsh=S1614432203%3A1780723557142622&flowName=GlifWebSignIn&hl=en-GB&kdi=CAM&rart=ANgoxcfyjAko_66ozJ1IBBLFxBJU5XXWtHhK3jJ3FHVS0gIucJ-1xQLKvOeHqedRxze_G3nq51loBviM4kojCfxs8m5jDQPNRx46l_0VOiHqX3xUrse1FuE&rpbg=1&sarp=1&scc=1">Forgot Password?</a>

                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="signup-btn">
                Create New Account
            </button>

            <div class="footer-links">
                <a href="index.html">Back to Home</a>
            </div>

        </div>

    </div>

</body>
</html>
