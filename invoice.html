<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - VendorBridge</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<!-- Navbar -->
<nav>
    <div class="logo">
        <h2>VendorBridge</h2>
    </div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="vendor.html">Vendors</a></li>
        <li><a href="#">RFQ</a></li>
        <li><a href="login.html">Logout</a></li>
    </ul>
</nav>

<!-- Invoice Section -->
<section class="vendor-section">

    <h2>Invoice Management</h2>

    <!-- Create Invoice -->
    <div class="vendor-form-card">

        <h3>Create Invoice</h3>

        <form id="invoiceForm">

            <div class="input-group">
                <label>Vendor Name</label>
                <input type="text" id="vendor" required>
            </div>

            <div class="input-group">
                <label>Product</label>
                <input type="text" id="product" required>
            </div>

            <div class="input-group">
                <label>Quantity</label>
                <input type="number" id="qty" required>
            </div>

            <div class="input-group">
                <label>Price (₹)</label>
                <input type="number" id="price" required>
            </div>

            <div class="input-group">
                <label>Total Amount</label>
                <input type="number" id="total" readonly>
            </div>

            <button type="submit" class="login-btn">
                Generate Invoice
            </button>

        </form>

    </div>

    <!-- Invoice List -->
    <div class="vendor-list-card">

        <h3>Generated Invoices</h3>

        <table>

            <thead>
                <tr>
                    <th>Vendor</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody id="invoiceTable">
            </tbody>

        </table>

    </div>

</section>

<script>

const form = document.getElementById("invoiceForm");
const table = document.getElementById("invoiceTable");

const qtyInput = document.getElementById("qty");
const priceInput = document.getElementById("price");
const totalInput = document.getElementById("total");

// Auto calculate total
function calculateTotal() {
    const qty = qtyInput.value || 0;
    const price = priceInput.value || 0;
    totalInput.value = qty * price;
}

qtyInput.addEventListener("input", calculateTotal);
priceInput.addEventListener("input", calculateTotal);

// Load existing invoices
window.onload = () => {
    const invoices = JSON.parse(localStorage.getItem("invoices")) || [];
    invoices.forEach(addInvoice);
};

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const invoice = {
        vendor: document.getElementById("vendor").value,
        product: document.getElementById("product").value,
        qty: qtyInput.value,
        price: priceInput.value,
        total: totalInput.value
    };

    addInvoice(invoice);

    let invoices = JSON.parse(localStorage.getItem("invoices")) || [];
    invoices.push(invoice);
    localStorage.setItem("invoices", JSON.stringify(invoices));

    form.reset();
    totalInput.value = "";
});

function addInvoice(inv) {
    const row = `
        <tr>
            <td>${inv.vendor}</td>
            <td>${inv.product}</td>
            <td>${inv.qty}</td>
            <td>₹${inv.price}</td>
            <td>₹${inv.total}</td>
        </tr>
    `;
    table.innerHTML += row;
}

</script>

</body>
</html>
